services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: collabite
      POSTGRES_USER: collabite_admin
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabite_admin -d collabite"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
